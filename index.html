<style id="tkpa-critical-style">

ite;box-shadow:none}nav button.on,nav button:hover{background:var(--gold);color:#06122f}main{padding:28px}.hero{min-height:280px;background-size:cover;background-position:center;border-radius:30px;color:white;padding:34px;display:flex;align-items:center;box-shadow:0 20px 70px rgba(8,27,75,.22)}.hero h1{font-size:42px;margin:0 0 10px}.hero p{max-width:760px;line-height:1.6;color:#e8edff}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:20px}.stats div,.panel,.fiche-card{background:white;border:1px solid var(--line);border-radius:24px;padding:20px;box-shadow:0 15px 35px rgba(8,27,75,.08)}.stats div{display:grid;gap:8px;color:var(--blue)}.stats b{font-size:30px}.header{margin-bottom:18px}.header h1{margin:0;color:var(--blue);font-size:34px}.header p,small,.muted{color:var(--muted)}.toolbar{display:grid;grid-template-columns:1fr 220px auto;gap:12px;margin-bottom:18px}.search{position:relative}.search svg{position:absolute;left:12px;top:12px;color:var(--muted)}.search input{padding-left:42px}.locked-filter{border:1px solid var(--line);border-radius:14px;padding:12px;background:#f8fbff;color:var(--blue);font-weight:900;text-align:center}.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px}.card-top,.line-title,.piece-head,.bottom-actions,.image-line,.user-row,.proposal-head{display:flex;align-items:center;justify-content:space-between;gap:12px}.fiche-card h3{margin:14px 0 8px;color:var(--blue)}.fiche-card p{display:flex;align-items:center;gap:8px;color:var(--muted);margin:8px 0}.badge{padding:7px 10px;border-radius:999px;font-size:12px;font-weight:900;background:#fff4cf;color:#7a5200}.badge.en_cours{background:#e8efff;color:#12347c}.badge.realise{background:#e6f7ed;color:#16703b}.mini-pieces,.request-preview{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}.mini-pieces span{background:var(--soft);color:var(--blue);padding:6px 8px;border-radius:999px;font-size:12px;font-weight:700}.actions{display:flex;flex-wrap:
